<!DOCTYPE html>
<html class="scroll-smooth" lang="vi">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100..900;1,100..900&family=Inter:wght@100..900&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="//storage.googleapis.com" rel="dns-prefetch"/>
    <link href="//unpkg.com" rel="dns-prefetch"/>
    <link href="//cdn.jsdelivr.net" rel="dns-prefetch"/>
    <link href="//cdnjs.cloudflare.com" rel="dns-prefetch"/>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title data-lang-key="contact_page_title">Liên Hệ - IVS JSC</title>
    <meta content="Kết nối với IVS JSC để nhận tư vấn chuyên sâu về giáo dục, công nghệ và các giải pháp doanh nghiệp. Chúng tôi luôn sẵn sàng lắng nghe." data-lang-key="contact_meta_description" name="description"/>
    <meta content="IVS JSC, liên hệ, tư vấn giáo dục, công nghệ, giải pháp doanh nghiệp" data-lang-key="contact_meta_keywords" name="keywords"/>
    <meta content="Liên Hệ IVS JSC - Kết Nối Để Cùng Phát Triển" data-lang-key="contact_og_title" property="og:title"/>
    <meta content="Gửi yêu cầu, câu hỏi hoặc đề xuất hợp tác đến IVS JSC qua form liên hệ, điện thoại, email hoặc ghé thăm văn phòng của chúng tôi." data-lang-key="contact_og_description" property="og:description"/>
    <meta content="https://ivsacademy.edu.vn/images/banners/ivs_contact_og.jpg" property="og:image"/>
    <meta content="https://ivsacademy.edu.vn/contact.html" property="og:url"/>
    <meta property="og:type" content="website">
    <meta name="author" content="IVS JSC" />
    <link href="/images/logo/logo.svg" rel="icon" type="image/svg+xml"/>
    <link href="/css/tailwind.css" rel="stylesheet"/>
    <link crossorigin="anonymous" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" referrerpolicy="no-referrer" rel="stylesheet"/>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet"/>
    <script defer src="/js/language-init.js"></script>
<style>
        :root { --header-height: 4rem; }
        body { background-color: #1a1a1a; color: #f4f4f5; font-family: 'Be Vietnam Pro', sans-serif; overflow-x: hidden; padding-top: var(--header-height); }
        #header-placeholder { position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); z-index: 1000; background-color: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #1f2937; }
        section { scroll-margin-top: calc(var(--header-height) + 1rem); padding: 4rem 1rem; }
        @media (min-width: 768px) { section { padding: 6rem 2rem; } }
        .form-input, .form-textarea, .form-select {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: #f4f4f5;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            border-color: #4c5ef7;
            box-shadow: 0 0 0 3px rgba(76, 94, 247, 0.3);
            outline: none;
        }
</style>
</head>
<body class="bg-ivs-bg text-ivs-text-primary font-inter">

<header id="header-placeholder"></header>

<main>
    <section class="bg-ivs-neutral-800 text-center py-20" id="hero">
        <div class="container mx-auto px-4" data-aos="fade-up">
            <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-4" data-lang-key="contact_hero_title">Liên Hệ Với Chúng Tôi</h1>
            <p class="text-lg md:text-xl text-ivs-text-secondary max-w-3xl mx-auto" data-lang-key="contact_hero_description">Chúng tôi luôn sẵn sàng lắng nghe và hỗ trợ bạn. Hãy kết nối với IVS JSC để nhận tư vấn chuyên sâu về giáo dục, công nghệ và các giải pháp doanh nghiệp.</p>
        </div>
    </section>

    <section class="py-16 md:py-24 bg-ivs-bg">
        <div class="container mx-auto px-4">
            <div class="max-w-6xl mx-auto bg-ivs-card rounded-2xl shadow-2xl p-8 md:p-12 grid md:grid-cols-2 gap-12" data-aos="fade-up">
                <!-- Contact Info -->
                <div class="space-y-8">
                    <h2 class="text-3xl font-bold text-white" data-lang-key="contact_info_title">Thông Tin Liên Hệ</h2>
                    <div class="space-y-6 text-lg">
                        <p class="flex items-start"><i class="fas fa-map-marker-alt text-ivs-blue mt-1 mr-4"></i><span data-lang-key="contact_address"></span></p>
                        <p class="flex items-center"><i class="fas fa-phone text-ivs-blue mr-4"></i><a href="tel:+84795555789" class="hover:text-ivs-blue" data-lang-key="contact_phone"></a></p>
                        <p class="flex items-center"><i class="fas fa-envelope text-ivs-blue mr-4"></i><a href="mailto:info@ivsacademy.edu.vn" class="hover:text-ivs-blue">info@ivsacademy.edu.vn</a></p>
                        <p class="flex items-center"><i class="fas fa-file-alt text-ivs-blue mr-4"></i><span data-lang-key="contact_tax_code"></span></p>
                    </div>
                    <div class="pt-6 border-t border-ivs-border">
                        <h3 class="text-xl font-semibold text-white mb-4">Mạng xã hội</h3>
                        <div class="flex space-x-4">
                            <a href="#" class="text-ivs-text-secondary hover:text-ivs-blue text-2xl"><i class="fab fa-facebook"></i></a>
                            <a href="#" class="text-ivs-text-secondary hover:text-ivs-blue text-2xl"><i class="fab fa-youtube"></i></a>
                            <a href="#" class="text-ivs-text-secondary hover:text-ivs-blue text-2xl"><i class="fab fa-tiktok"></i></a>
                        </div>
                    </div>
                </div>

                <!-- Contact Form -->
                <div>
                    <h2 class="text-3xl font-bold text-white mb-6" data-lang-key="contact_form_title">Gửi Yêu Cầu</h2>
                    <form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" class="space-y-6">
                        <input type="hidden" name="form-name" value="contact" />
                        <div class="hidden"><label>Don’t fill this out if you’re human: <input name="bot-field" /></label></div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2" for="name" data-lang-key="form_name_label">Họ và Tên *</label>
                            <input class="form-input" id="name" name="name" type="text" required />
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2" for="email" data-lang-key="form_email_label">Email *</label>
                            <input class="form-input" id="email" name="email" type="email" required />
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2" for="phone" data-lang-key="form_phone_label">Số Điện Thoại</label>
                            <input class="form-input" id="phone" name="phone" type="tel" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2" for="message" data-lang-key="form_message_label">Nội Dung Yêu Cầu</label>
                            <textarea class="form-textarea" id="message" name="message" rows="5"></textarea>
                        </div>
                        <div>
                            <button type="submit" class="w-full bg-ivs-blue hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-all transform hover:scale-105" data-lang-key="form_submit_button">Gửi Yêu Cầu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</main>

<footer id="footer-placeholder"></footer>
<div id="fab-container-placeholder"></div>

<!-- Scripts -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/language.js"></script>
<script src="/ai/js/fabController.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof AOS !== 'undefined') {
            AOS.init({ duration: 800, once: true, offset: 50 });
        }
    });
</script>
<script defer src="/js/aivy-integration.js"></script>
<script defer src="/ai/js/loadComponents.js"></script>

</body>
</html>
