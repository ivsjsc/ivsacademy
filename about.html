<head>

    <meta content="Khám phá câu chuyện, tầm nhìn, sứ mệnh, triết lý hoạt động và hệ sinh thái dịch vụ toàn diện của IVS JSC - Tổ chức tiên phong kiến tạo tương lai giáo dục." data-lang-key="about_meta_description" name="description"/>
    <meta content="IVS JSC, về chúng tôi, tầm nhìn, sứ mệnh, integrate vision synergy, hệ sinh thái giáo dục, EdTech" data-lang-key="about_meta_keywords" name="keywords"/>
    <meta content="Về IVS JSC - Tầm Nhìn, Sứ Mệnh & Giải Pháp" data-lang-key="about_og_title" property="og:title"/>
    <meta content="Tìm hiểu sâu hơn về IVS JSC: triết lý Integrate-Vision-Synergy, hành trình phát triển, và hệ sinh thái giải pháp toàn diện cho giáo dục." data-lang-key="about_og_description" property="og:description"/>

<style>
        :root { --header-height: 4rem; }
        body { background-color: #1a1a1a; color: #f4f4f5; font-family: 'Be Vietnam Pro', sans-serif; overflow-x: hidden; padding-top: var(--header-height); }
        #header-placeholder { position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); z-index: 1000; background-color: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #1f2937; }
        section { scroll-margin-top: calc(var(--header-height) + 1rem); padding: 4rem 1rem; }
        @media (min-width: 768px) { section { padding: 6rem 2rem; } }
        .interactive-card { background: #111111; border: 1px solid #27272A; transition: all 0.3s ease; }
        .interactive-card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px -5px rgba(76, 94, 247, 0.2); border-color: #4c5ef7; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 0.75rem; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Enhanced Banner Styles */
        .hero-gradient-overlay {
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 50%, rgba(59, 130, 246, 0.3) 100%);
        }
        
        .hero-title-gradient {
            background: linear-gradient(90deg, #ffffff 0%, #bfdbfe 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .scroll-indicator {
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0) translateX(-50%);
            }
            40% {
                transform: translateY(-10px) translateX(-50%);
            }
            60% {
                transform: translateY(-5px) translateX(-50%);
            }
        }
        
        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: .5;
            }
        }
        
        .ping-animation {
            animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        
        @keyframes ping {
            75%, 100% {
                transform: scale(2);
                opacity: 0;
            }
        }
</style>
</head>
<body class="bg-ivs-bg text-ivs-text-primary font-inter">

<header id="header-placeholder"></header>

<main>
    <!-- Enhanced Full Screen Hero Video Section -->
    <section class="relative h-screen flex items-center justify-center text-center p-0 overflow-hidden">
        <!-- Video Background -->
        <video autoplay loop muted playsinline class="absolute z-0 w-auto min-w-full min-h-full max-w-none">
            <source src="/videos/ivs_background_video1.mp4" type="video/mp4" />
            Your browser does not support the video tag.
        </video>
        
        <!-- Enhanced Overlay with Gradient -->
        <div class="absolute inset-0 hero-gradient-overlay z-10"></div>
        
        <!-- Animated Particles/Decorative Elements -->
        <div class="absolute inset-0 z-15 pointer-events-none">
            <div class="absolute top-1/4 left-1/4 w-2 h-2 bg-ivs-blue/30 rounded-full pulse-animation"></div>
            <div class="absolute top-1/3 right-1/3 w-3 h-3 bg-ivs-green/20 rounded-full ping-animation" style="animation-duration: 3s;"></div>
            <div class="absolute bottom-1/3 left-1/3 w-1.5 h-1.5 bg-ivs-amber/40 rounded-full pulse-animation" style="animation-delay: 1s;"></div>
            <div class="absolute bottom-1/4 right-1/4 w-2.5 h-2.5 bg-ivs-blue/25 rounded-full ping-animation" style="animation-duration: 4s;"></div>
        </div>
        
        <!-- Hero Content -->
        <div class="relative z-20 container mx-auto px-6" data-aos="fade-up">
            <!-- Decorative Line -->
            <div class="w-20 h-1 bg-gradient-to-r from-ivs-blue to-ivs-green mx-auto mb-6 rounded-full"></div>
            
            <!-- Main Title with Better Typography -->
            <h1 class="text-5xl md:text-6xl lg:text-7xl font-extrabold text-white mb-6 tracking-tight">
                <span class="hero-title-gradient" data-lang-key="about_hero_title">Về IVS JSC</span>
            </h1>
            
            <!-- Subtitle with Better Styling -->
            <p class="text-xl md:text-2xl text-white/90 max-w-4xl mx-auto mb-8 leading-relaxed font-light" data-lang-key="about_hero_subtitle">
                Kiến tạo một hệ sinh thái giáo dục toàn diện, bền vững và sáng tạo.
            </p>
            
            <!-- CTA Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <a href="#intro" class="group inline-flex items-center gap-2 bg-ivs-blue hover:bg-blue-600 text-white font-semibold py-3 px-8 rounded-full transition-all duration-300 transform hover:scale-105 shadow-lg shadow-blue-500/30">
                    <span>Khám Phá</span>
                    <i class="fas fa-arrow-down group-hover:translate-y-1 transition-transform"></i>
                </a>
                <a href="profile-company-ivsjsc.html" class="group inline-flex items-center gap-2 bg-white/10 hover:bg-white/20 backdrop-blur-sm text-white font-semibold py-3 px-8 rounded-full border border-white/30 transition-all duration-300 transform hover:scale-105">
                    <span>Hồ Sơ Năng Lực</span>
                    <i class="fas fa-file-alt group-hover:translate-x-1 transition-transform"></i>
                </a>
            </div>
        </div>
        
        <!-- Scroll Indicator -->
        <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 z-20 scroll-indicator">
            <div class="w-6 h-10 border-2 border-white/50 rounded-full flex justify-center">
                <div class="w-1 h-3 bg-white/70 rounded-full mt-2 pulse-animation"></div>
            </div>
        </div>
    </section>

    <!-- Intro Section -->
    <section class="py-16 md:py-24 bg-ivs-bg">
        <div class="container mx-auto px-6">
            <div class="grid lg:grid-cols-2 gap-12 lg:gap-16 items-center">
                <div data-aos="fade-right">
                    <h2 class="font-display text-3xl md:text-4xl font-bold text-white mb-4" data-lang-key="about_intro_title">Câu Chuyện Về IVS</h2>
                    <p class="text-ivs-text-secondary mb-8 leading-relaxed text-lg" data-lang-key="about_intro_desc"></p>
                    <a class="inline-block bg-ivs-blue hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-all transform hover:scale-105 shadow-lg shadow-blue-500/30" href="profile-company-ivsjsc.html">
                        <i class="fas fa-arrow-right mr-2"></i>
                        <span data-lang-key="about_cta_view_profile">Xem Hồ Sơ Năng Lực</span>
                    </a>
                </div>
                <div class="video-container shadow-2xl border border-ivs-border" data-aos="fade-left">
                    <iframe loading="lazy" src="https://www.youtube.com/embed/WSFdBq4vprY?si=X1lIscHb06k3eJK_" title="YouTube video player: IVS JSC Company Profile" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </section>

    <!-- Philosophy Section -->
    <section class="py-16 md:py-24 bg-ivs-neutral-800 border-y border-ivs-border">
        <div class="container mx-auto px-6">
            <div class="text-center mb-12 md:mb-16" data-aos="fade-up">

                <p class="text-lg text-ivs-text-secondary max-w-3xl mx-auto mt-4" data-lang-key="about_philosophy_ivs"></p>
            </div>
            <div class="grid md:grid-cols-3 gap-8">
                <div class="interactive-card p-8 rounded-xl text-center" data-aos="fade-up" data-aos-delay="100">
                    <i class="fas fa-project-diagram text-5xl text-ivs-green mb-4"></i>
                    <h3 class="text-2xl font-display font-semibold text-white mb-3" data-lang-key="about_philosophy_integrate">Integrate</h3>
                    <p class="text-ivs-text-secondary leading-relaxed" data-lang-key="about_philosophy_integrate_desc"></p>
                </div>
                <div class="interactive-card p-8 rounded-xl text-center" data-aos="fade-up" data-aos-delay="200">

                    <h3 class="text-2xl font-display font-semibold text-white mb-3" data-lang-key="about_philosophy_vision">Vision</h3>
                    <p class="text-ivs-text-secondary leading-relaxed" data-lang-key="about_philosophy_vision_desc"></p>
                </div>
                <div class="interactive-card p-8 rounded-xl text-center" data-aos="fade-up" data-aos-delay="300">
                    <i class="fas fa-hands-helping text-5xl text-ivs-amber mb-4"></i>
                    <h3 class="text-2xl font-display font-semibold text-white mb-3" data-lang-key="about_philosophy_synergy">Synergy</h3>
                    <p class="text-ivs-text-secondary leading-relaxed" data-lang-key="about_philosophy_synergy_desc"></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Leadership Team Section -->
    <section class="py-16 md:py-24 bg-ivs-bg">
        <div class="container mx-auto px-6">
            <div class="text-center mb-12 md:mb-16" data-aos="fade-up">
                <h2 class="font-display text-3xl md:text-4xl font-bold text-white" data-lang-key="about_team_title">Đội Ngũ Lãnh Đạo</h2>
                <p class="text-lg text-ivs-text-secondary max-w-3xl mx-auto mt-4" data-lang-key="about_team_subtitle"></p>
            </div>
            <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-8">
                <div class="text-center" data-aos="fade-up" data-aos-delay="100">
                    <img alt="Ông Nguyễn Minh Triết" class="h-32 w-32 rounded-full object-cover mx-auto mb-4 border-4 border-ivs-border hover:border-ivs-blue transition-colors" src="/images/team/nguyen-minh-triet.jpg">
                    <h4 class="font-semibold text-xl text-white" data-lang-key="about_team_member1_name"></h4>
                    <p class="text-ivs-blue font-medium" data-lang-key="about_team_member1_title"></p>
                </div>
                <div class="text-center" data-aos="fade-up" data-aos-delay="200">
                    <img alt="Ông Rachid Belferar" class="h-32 w-32 rounded-full object-cover mx-auto mb-4 border-4 border-ivs-border hover:border-ivs-blue transition-colors" src="/images/team/rachid-belferar.jpg">
                    <h4 class="font-semibold text-xl text-white" data-lang-key="about_team_member2_name"></h4>
                    <p class="text-ivs-blue font-medium" data-lang-key="about_team_member2_title"></p>
                </div>
                <div class="text-center" data-aos="fade-up" data-aos-delay="300">
                    <img alt="Bà Salma Mahzoum" class="h-32 w-32 rounded-full object-cover mx-auto mb-4 border-4 border-ivs-border hover:border-ivs-blue transition-colors" src="/images/team/salma-mahzoum.jpg">
                    <h4 class="font-semibold text-xl text-white" data-lang-key="about_team_member3_name"></h4>
                    <p class="text-ivs-blue font-medium" data-lang-key="about_team_member3_title"></p>
                </div>
                <div class="text-center" data-aos="fade-up" data-aos-delay="400">
                    <img alt="Ông Kimball Allen Thomson" class="h-32 w-32 rounded-full object-cover mx-auto mb-4 border-4 border-ivs-border hover:border-ivs-blue transition-colors" src="/images/team/kimball-allen-thomson.jpg">
                    <h4 class="font-semibold text-xl text-white" data-lang-key="about_team_member4_name"></h4>
                    <p class="text-ivs-blue font-medium" data-lang-key="about_team_member4_title"></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Final CTA Section -->
    <section class="py-16 md:py-24 bg-ivs-neutral-800">
        <div class="container mx-auto px-6 text-center" data-aos="zoom-in">
            <h2 class="font-display text-3xl md:text-4xl font-bold text-white mb-4" data-lang-key="about_cta_final_title">Trở thành đối tác của IVS</h2>
            <p class="text-ivs-text-secondary text-lg max-w-2xl mx-auto mb-8" data-lang-key="about_cta_final_desc"></p>
            <a class="inline-block bg-ivs-blue hover:bg-ivs-cyan text-white font-bold py-4 px-10 rounded-full text-lg transition-all transform hover:scale-105 shadow-lg shadow-blue-500/30" href="contact.html">
                <span data-lang-key="contact_us">Liên Hệ Ngay</span> <i class="fas fa-arrow-right ml-2"></i>
            </a>

    </section>

</main>
