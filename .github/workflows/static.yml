# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        continue-on-error: true
      - name: Setup Node 18 for webapp build
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Show Node & npm versions
        run: |
          echo "Node version:"; node --version
          echo "npm version:"; npm --version
      - name: Build webapp (create webapp-dist)
        working-directory: ./webapp
        run: |
          npm ci
          npm run build
      - name: Verify webapp-dist exists
        # Run from repository root (defaults to working-directory), the Vite build is configured
        # to write the output to ../webapp-dist so the repo root should now contain `webapp-dist`.
        run: |
          echo "Checking for webapp-dist in repo root..."
          if [ ! -d "webapp-dist" ]; then
            echo "ERROR: webapp-dist directory not found after build; listing top-level files for diagnosis:"
            ls -la || true
            exit 1
          fi
          echo "webapp-dist exists — listing contents (truncated):"
          ls -laR webapp-dist | sed -n '1,200p' || true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          error_count: 5
