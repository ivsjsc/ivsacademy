name: Deploy → staging (GCP)

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'GCP Project ID'
        required: true
      cloud_run_service:
        description: 'Cloud Run service name'
        required: true
      region:
        description: 'GCP region'
        required: false
        default: 'us-east4'
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

# Note: This workflow requires the GCP service account key stored in the
# secret `GCP_SA_KEY`. Secrets are not available to workflows triggered
# from forks (including Dependabot); to avoid failing early the job is
# restricted to run only within the main repository. Consider switching
# to Workload Identity Federation (OIDC) to avoid long-lived JSON keys.

jobs:
  deploy:
    if: ${{ github.repository == 'ivsjsc/ivs.github.io' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Ensure GCP credentials secret exists
        shell: bash
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "Secret GCP_SA_KEY is not set. This workflow requires GCP credentials to deploy. Failing early."
            exit 1
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install gcloud SDK
        run: |
          sudo apt-get update -y
          curl -sSL https://sdk.cloud.google.com | bash > /dev/null
          source "$HOME/google-cloud-sdk/path.bash.inc"
          gcloud --version

      - name: Configure project
        run: |
          source "$HOME/google-cloud-sdk/path.bash.inc"
          gcloud config set project "${{ github.event.inputs.project_id || secrets.GCP_PROJECT }}"

      - name: Enable required GCP APIs
        run: |
          source "$HOME/google-cloud-sdk/path.bash.inc"
          PROJECT_ID="${{ github.event.inputs.project_id || secrets.GCP_PROJECT }}"
          PROJECT_ID="${PROJECT_ID:?}"
          ./server/scripts/gcp/enable_apis.sh
        env:
          PROJECT_ID: ${{ github.event.inputs.project_id || secrets.GCP_PROJECT }}

      - name: Run server tests
        run: npm ci --prefix server && npm test --prefix server

      - name: Build frontend (ivs-celestech)
        run: npm ci --prefix Pages/ivs-celestech && npm run build --prefix Pages/ivs-celestech

      - name: Redeploy Cloud Run service
        run: |
          source "$HOME/google-cloud-sdk/path.bash.inc"
          PROJECT_ID="${{ github.event.inputs.project_id || secrets.GCP_PROJECT }}"
          CLOUD_RUN_SERVICE="${{ github.event.inputs.cloud_run_service }}"
          REGION="${{ github.event.inputs.region || 'us-east4' }}"
          PROJECT_ID="${PROJECT_ID:?}"
          CLOUD_RUN_SERVICE="${CLOUD_RUN_SERVICE:?}"
          PROJECT_ID="$PROJECT_ID" CLOUD_RUN_SERVICE="$CLOUD_RUN_SERVICE" REGION="$REGION" ./server/scripts/gcp/redeploy_cloudrun.sh
