<!-- FAB IVS Assistant -->
<div id="fab-assistant-container" class="fixed left-4 z-40 flex flex-col items-end space-y-6 bottom-6 md:bottom-6">

    <!-- Nút FAB IVS Assistant -->
    <div class="relative group/fab">
        <button id="assistant-main-btn" title="IVS Assistant" aria-label="Mở IVS Assistant" aria-haspopup="true" aria-expanded="false" aria-controls="assistant-options"
                class="fab-item flex items-center justify-center w-14 h-14 md:w-16 md:h-16 shadow-xl hover:shadow-2xl focus:ring-2 focus:ring-orange-400 outline-none"
                tabindex="0" role="button">

        <div id="assistant-options"

             role="menu" aria-orientation="vertical" aria-labelledby="assistant-main-btn">
            <!-- Nội dung cho assistant-options sẽ được JavaScript chèn vào đây -->
        </div>
    </div>
</div>
