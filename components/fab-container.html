<!-- FAB Container Component - Floating Action Buttons for IVS Website -->
<!-- @version 1.0.0
     @author IVS JSC
     @description Floating Action Buttons with social links, contact options, and utility functions
-->

<div id="fab-container" class="fixed bottom-6 right-6 z-50 flex flex-col space-y-3">
    <!-- Main FAB Button -->
    <button id="fab-main-btn"
            class="group relative w-14 h-14 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white rounded-full shadow-lg hover:shadow-xl transform hover:scale-110 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-blue-300"
            aria-label="Mở menu hành động"
            aria-expanded="false"
            aria-haspopup="true">
        <i class="fas fa-plus text-xl transition-transform duration-300 group-hover:rotate-45" id="fab-icon"></i>

        <!-- Ripple effect -->
        <div class="absolute inset-0 rounded-full bg-white opacity-0 group-active:opacity-20 transition-opacity duration-150"></div>
    </button>

    <!-- Contact Options Menu -->
    <div id="contact-options"
         class="fab-menu opacity-0 scale-0 transition-all duration-300 pointer-events-none flex flex-col space-y-2">
        <a href="tel:+84987654321"
           class="fab-option group flex items-center justify-center w-12 h-12 bg-green-500 hover:bg-green-600 text-white rounded-full shadow-lg hover:shadow-xl transform hover:scale-110 transition-all duration-300"
           aria-label="Gọi điện thoại"
           title="Gọi ngay: +84 987 654 321">
            <i class="fas fa-phone text-lg"></i>
        </a>

        <a href="https://zalo.me/0987654321"
           target="_blank"
           rel="noopener noreferrer"
           class="fab-option group flex items-center justify-center w-12 h-12 bg-blue-500 hover:bg-blue-600 text-white rounded-full shadow-lg hover:shadow-xl transform hover:scale-110 transition-all duration-300"
           aria-label="Chat Zalo"
           title="Chat Zalo">
            <i class="fas fa-comment text-lg"></i>
        </a>

        <a href="mailto:info@ivsacademy.edu.vn"
           class="fab-option group flex items-center justify-center w-12 h-12 bg-red-500 hover:bg-red-600 text-white rounded-full shadow-lg hover:shadow-xl transform hover:scale-110 transition-all duration-300"
           aria-label="Gửi email"
           title="Gửi email: info@ivsacademy.edu.vn">
            <i class="fas fa-envelope text-lg"></i>
        </a>
    </div>

    <!-- Share Options Menu -->
    <div id="share-options"
         class="fab-menu opacity-0 scale-0 transition-all duration-300 pointer-events-none flex flex-col space-y-2">
        <button onclick="shareOnFacebook()"
                class="fab-option group flex items-center justify-center w-12 h-12 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-lg hover:shadow-xl transform hover:scale-110 transition-all duration-300"
                aria-label="Chia sẻ lên Facebook"
                title="Chia sẻ lên Facebook">
            <i class="fab fa-facebook-f text-lg"></i>
        </button>

        <button onclick="shareOnTwitter()"
                class="fab-option group flex items-center justify-center w-12 h-12 bg-sky-500 hover:bg-sky-600 text-white rounded-full shadow-lg hover:shadow-xl transform hover:scale-110 transition-all duration-300"
                aria-label="Chia sẻ lên Twitter"
                title="Chia sẻ lên Twitter">
            <i class="fab fa-twitter text-lg"></i>
        </button>

        <button onclick="shareOnLinkedIn()"
                class="fab-option group flex items-center justify-center w-12 h-12 bg-blue-700 hover:bg-blue-800 text-white rounded-full shadow-lg hover:shadow-xl transform hover:scale-110 transition-all duration-300"
                aria-label="Chia sẻ lên LinkedIn"
                title="Chia sẻ lên LinkedIn">
            <i class="fab fa-linkedin-in text-lg"></i>
        </button>

        <button onclick="copyPageLink()"
                class="fab-option group flex items-center justify-center w-12 h-12 bg-gray-600 hover:bg-gray-700 text-white rounded-full shadow-lg hover:shadow-xl transform hover:scale-110 transition-all duration-300"
                aria-label="Sao chép liên kết"
                title="Sao chép liên kết trang">
            <i class="fas fa-link text-lg"></i>
        </button>
    </div>

    <!-- Secondary FAB Buttons -->
    <div class="flex flex-col space-y-2">
        <!-- Back to Top Button -->
        <button id="back-to-top-btn"
                class="fab-secondary opacity-0 translate-y-4 transition-all duration-300 flex items-center justify-center w-10 h-10 bg-white hover:bg-gray-50 text-gray-600 hover:text-gray-800 rounded-full shadow-lg hover:shadow-xl transform hover:scale-110 border border-gray-200"
                aria-label="Cuộn lên đầu trang"
                title="Cuộn lên đầu trang">
            <i class="fas fa-arrow-up text-sm"></i>
        </button>

        <!-- Dark Mode Toggle -->
        <button id="dark-mode-toggle"
                class="fab-secondary opacity-0 translate-y-4 transition-all duration-300 flex items-center justify-center w-10 h-10 bg-white hover:bg-gray-50 text-gray-600 hover:text-gray-800 rounded-full shadow-lg hover:shadow-xl transform hover:scale-110 border border-gray-200"
                aria-label="Chuyển đổi chế độ tối"
                title="Chuyển đổi chế độ tối">
            <i class="fas fa-moon text-sm" id="dark-mode-icon"></i>
        </button>
    </div>
</div>

<!-- FAB Styles -->
<style>
    .fab-menu {
        transform-origin: bottom center;
    }

    .fab-menu.active {
        opacity: 1;
        transform: scale(1);
        pointer-events: auto;
    }

    .fab-option, .fab-secondary {
        position: relative;
        overflow: hidden;
    }

    .fab-option::before, .fab-secondary::before {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.2);
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .fab-option:active::before, .fab-secondary:active::before {
        opacity: 1;
    }

    /* Hide FAB on mobile when keyboard is shown */
    @media (max-width: 768px) {
        .fab-hidden-on-mobile-keyboard {
            display: none !important;
        }
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
        .fab-option, .fab-secondary, #fab-main-btn {
            transition: none;
            transform: none !important;
        }

        .fab-menu {
            transition: opacity 0.3s ease;
        }
    }
</style>

<!-- FAB JavaScript will be loaded separately via fab-container.js -->
