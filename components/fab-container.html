document.addEventListener('DOMContentLoaded', () => {
<!-- Floating Action Button Container (FAB) -->
<div id="fab-container" class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">
    <!-- Scroll to Top Button -->
    <button id="scroll-to-top-btn" class="fab-item bg-blue-600 text-white shadow-lg rounded-full p-4 opacity-0 scale-90 pointer-events-none transition-all duration-300" aria-label="Cuộn lên đầu trang">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Main Contact Button -->
    <button id="contact-main-btn" class="fab-item bg-orange-500 text-white shadow-lg rounded-full p-4" aria-haspopup="true" aria-controls="contact-options" aria-expanded="false" aria-label="Liên hệ">
        <i class="fas fa-phone"></i>
    </button>
    <!-- Contact Options Submenu -->
    <div id="contact-options" class="fab-submenu hidden pointer-events-none absolute right-16 bottom-0 flex flex-col gap-2 bg-white dark:bg-gray-900 shadow-xl rounded-lg p-3 min-w-[160px]">
        <!-- Nội dung sẽ được JS populate -->
    </div>

    <!-- Main Share Button -->
    <button id="share-main-btn" class="fab-item bg-green-500 text-white shadow-lg rounded-full p-4" aria-haspopup="true" aria-controls="share-options" aria-expanded="false" aria-label="Chia sẻ">
        <i class="fas fa-share-alt"></i>
    </button>
    <!-- Share Options Submenu -->
    <div id="share-options" class="fab-submenu hidden pointer-events-none absolute right-16 bottom-0 flex flex-col gap-2 bg-white dark:bg-gray-900 shadow-xl rounded-lg p-3 min-w-[160px]">
        <!-- Nội dung sẽ được JS populate -->
    </div>
</div>
