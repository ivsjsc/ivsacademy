<!-- FAB behavior script: on-click toggles, keyboard support, click-outside, and scroll-to-top -->
<script>
    (function(){
        'use strict';

        const btn = (id) => document.getElementById(id);
        const panelClass = 'fab-submenu-panel';

        function togglePanel(panel, button){
            if(!panel) return;
            const isOpen = !panel.classList.contains('hidden');
            if(isOpen){
                panel.classList.add('hidden');
                panel.classList.remove('opacity-100','scale-100');
                if(button) button.setAttribute('aria-expanded','false');
            } else {
                panel.classList.remove('hidden');
                panel.classList.add('opacity-100','scale-100');
                if(button) button.setAttribute('aria-expanded','true');
            }
        }

        function closeAllPanels(){
            document.querySelectorAll('.' + panelClass).forEach(p=>{
                p.classList.add('hidden');
                p.classList.remove('opacity-100','scale-100');
            });
            ['share-main-btn','contact-main-btn','assistant-main-btn'].forEach(id=>{
                const b = btn(id);
                if(b) b.setAttribute('aria-expanded','false');
            });
        }

        document.addEventListener('DOMContentLoaded', ()=>{
            const shareBtn = btn('share-main-btn');
            const sharePanel = btn('share-options');
            const contactBtn = btn('contact-main-btn');
            const contactPanel = btn('contact-options');
            const assistantBtn = btn('assistant-main-btn');
            const assistantWindow = document.getElementById('ai-assistant-window') || document.getElementById('assistant-window') || document.getElementById('chat-window') || document.getElementById('ai-assistant');
            const scrollBtn = btn('scroll-to-top-btn');

            // Toggle handlers
            if(shareBtn) shareBtn.addEventListener('click', (e)=>{ e.stopPropagation(); togglePanel(sharePanel, shareBtn); });
            if(contactBtn) contactBtn.addEventListener('click', (e)=>{ e.stopPropagation(); togglePanel(contactPanel, contactBtn); });
            if(assistantBtn) assistantBtn.addEventListener('click', (e)=>{
                e.stopPropagation();
                // Toggle assistant window visibility
                if(!assistantWindow) return;
                const chatWindow = assistantWindow.querySelector('#chat-window');
                const isHidden = assistantWindow.classList.contains('hidden');
                if(isHidden){
                    assistantWindow.classList.remove('hidden');
                    if(chatWindow) chatWindow.classList.remove('hidden');
                    assistantBtn.setAttribute('aria-expanded','true');
                    // focus input if present
                    const input = assistantWindow.querySelector('#chat-input') || assistantWindow.querySelector('input, textarea');
                    if(input) setTimeout(()=>input.focus(), 120);
                } else {
                    assistantWindow.classList.add('hidden');
                    if(chatWindow) chatWindow.classList.add('hidden');
                    assistantBtn.setAttribute('aria-expanded','false');
                }
            });

            // Keyboard activation (Enter/Space)
            ['share-main-btn','contact-main-btn','assistant-main-btn','scroll-to-top-btn'].forEach(id=>{
                const b = btn(id);
                if(!b) return;
                b.addEventListener('keydown', (ev)=>{
                    if(ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); b.click(); }
                });
            });

            // Close on Escape
            document.addEventListener('keydown', (ev)=>{
                if(ev.key === 'Escape'){
                    closeAllPanels();
                    if(assistantBtn) assistantBtn.setAttribute('aria-expanded','false');
                    if(assistantWindow) assistantWindow.classList.add('hidden');
                }
            });

            // Click outside: close
            document.addEventListener('click', (ev)=>{
                const target = ev.target;
                if(!target.closest('#fab-container') && !target.closest('#ai-assistant-window') && !target.closest('.fab-submenu-panel')){
                    closeAllPanels();
                    if(assistantWindow) assistantWindow.classList.add('hidden');
                }
            }, true);

            // Scroll to top behaviour
            if(scrollBtn){
                scrollBtn.addEventListener('click', ()=> window.scrollTo({top:0,behavior:'smooth'}));
                // show/hide on scroll
                const onScroll = ()=>{
                    if(window.scrollY > 200){
                        scrollBtn.classList.remove('opacity-0','invisible','scale-90','pointer-events-none');
                        scrollBtn.classList.add('opacity-100');
                    } else {
                        scrollBtn.classList.add('opacity-0','invisible','scale-90','pointer-events-none');
                        scrollBtn.classList.remove('opacity-100');
                    }
                };
                document.addEventListener('scroll', onScroll, {passive:true});
                onScroll();
            }

            // Close panels when window resizes to avoid stuck panels
            window.addEventListener('resize', ()=> closeAllPanels());

            // Handle assistant button click to open chat directly
            const assistantMainBtn = document.getElementById('assistant-main-btn');
            if (assistantMainBtn) {
                assistantMainBtn.addEventListener('click', () => {
                    if (window.IVSFABChatbot && typeof window.IVSFABChatbot.openChat === 'function') {
                        window.IVSFABChatbot.openChat();
                    } else if (window.IVSFABChatbot && typeof window.IVSFABChatbot.init === 'function') {
                        window.IVSFABChatbot.init();
                        setTimeout(() => {
                            if (window.IVSFABChatbot && typeof window.IVSFABChatbot.openChat === 'function') {
                                window.IVSFABChatbot.openChat();
                            }
                        }, 100);
                    }
                });
            }
        });
    })();
</script>

<!-- AI Assistant JavaScript -->
<script>
(function() {
    'use strict';

    // IVSFABChatbot class for intelligent responses
    class IVSFABChatbot {
        constructor() {
            this.messages = [];
            this.isTyping = false;
            this.chatWindow = null;
            this.chatMessages = null;
            this.chatInput = null;
            this.chatSend = null;
            this.quickReplies = null;
            this.isInitialized = false;
        }

        init() {
            if (this.isInitialized) return;

            this.chatWindow = document.getElementById('chat-window');
            this.chatMessages = document.getElementById('chat-messages');
            this.chatInput = document.getElementById('chat-input');
            this.chatSend = document.getElementById('chat-send');
            this.quickReplies = document.querySelectorAll('.quick-reply');

            if (!this.chatWindow || !this.chatMessages || !this.chatInput || !this.chatSend) {
                console.warn('IVSFABChatbot: Missing required DOM elements');
                return;
            }

            this.bindEvents();
            this.addWelcomeMessage();
            this.isInitialized = true;
            window.componentLog('IVSFABChatbot initialized', 'info');
        }

        bindEvents() {
            // Send message on button click
            this.chatSend.addEventListener('click', () => this.sendMessage());

            // Send message on Enter key
            this.chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    this.sendMessage();
                }
            });

            // Quick reply buttons
            this.quickReplies.forEach(button => {
                button.addEventListener('click', () => {
                    const reply = button.getAttribute('data-reply');
                    this.handleQuickReply(reply);
                });
            });

            // Close chat
            const closeBtn = document.getElementById('chat-close');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => this.closeChat());
            }
        }

        addWelcomeMessage() {
            const welcomeMessage = {
                type: 'bot',
                content: 'Xin chào! Tôi là trợ lý AI của IVS Academy. Tôi có thể giúp bạn tìm hiểu về các khóa học, giáo viên, và thông tin liên hệ. Bạn cần hỗ trợ gì?',
                timestamp: new Date()
            };
            this.addMessage(welcomeMessage);
        }

        sendMessage() {
            const message = this.chatInput.value.trim();
            if (!message) return;

            // Add user message
            const userMessage = {
                type: 'user',
                content: message,
                timestamp: new Date()
            };
            this.addMessage(userMessage);

            // Clear input
            this.chatInput.value = '';

            // Show typing indicator
            this.showTyping();

            // Process response after delay
            setTimeout(() => {
                this.hideTyping();
                this.generateResponse(message);
            }, 1000 + Math.random() * 1000);
        }

        handleQuickReply(replyType) {
            let message = '';
            switch (replyType) {
                case 'courses':
                    message = 'Tôi muốn biết về các khóa học';
                    break;
                case 'teachers':
                    message = 'Kể cho tôi về đội ngũ giáo viên';
                    break;
                case 'contact':
                    message = 'Làm thế nào để liên hệ với IVS?';
                    break;
                default:
                    message = replyType;
            }

            // Simulate user message
            const userMessage = {
                type: 'user',
                content: message,
                timestamp: new Date()
            };
            this.addMessage(userMessage);

            // Show typing and respond
            this.showTyping();
            setTimeout(() => {
                this.hideTyping();
                this.generateResponse(message);
            }, 800);
        }

        generateResponse(userMessage) {
            const message = userMessage.toLowerCase();
            let response = '';

            // Intelligent responses based on keywords
            if (message.includes('khóa học') || message.includes('course') || message.includes('học')) {
                response = 'IVS Academy cung cấp các khóa học chất lượng cao về Tiếng Anh, Công nghệ, và Giáo dục. Chúng tôi có chương trình học phù hợp cho mọi lứa tuổi từ trẻ em đến người lớn. Bạn quan tâm đến lĩnh vực nào?';
            } else if (message.includes('giáo viên') || message.includes('teacher') || message.includes('giảng viên')) {
                response = 'Đội ngũ giáo viên của IVS Academy gồm các chuyên gia có kinh nghiệm và chứng chỉ quốc tế. Chúng tôi có giáo viên bản ngữ và giáo viên Việt Nam giàu kinh nghiệm. Tất cả đều được đào tạo chuyên nghiệp.';
            } else if (message.includes('liên hệ') || message.includes('contact') || message.includes('liên lạc')) {
                response = 'Bạn có thể liên hệ với IVS Academy qua:\n• Email: info@ivsacademy.edu.vn\n• Điện thoại: 1900 XXX XXX\n• Website: www.ivsacademy.edu.vn\n• Địa chỉ: Hà Nội và TP.HCM';
            } else if (message.includes('giá') || message.includes('price') || message.includes('phí')) {
                response = 'Thông tin về học phí sẽ được cung cấp chi tiết khi bạn đăng ký tư vấn. Mỗi khóa học có mức giá khác nhau tùy thuộc vào thời lượng và nội dung. Liên hệ để nhận báo giá cụ thể!';
            } else if (message.includes('đăng ký') || message.includes('register') || message.includes('enroll')) {
                response = 'Để đăng ký khóa học, bạn có thể:\n1. Điền form tư vấn trên website\n2. Gọi hotline: 1900 XXX XXX\n3. Đến trực tiếp văn phòng IVS\nChúng tôi sẽ hỗ trợ bạn chọn khóa học phù hợp nhất!';
            } else {
                response = 'Cảm ơn bạn đã liên hệ với IVS Academy! Tôi có thể giúp bạn tìm hiểu thêm về:\n• Các khóa học Tiếng Anh và Công nghệ\n• Thông tin tuyển dụng giáo viên\n• Tư vấn học tập\n• Liên hệ hợp tác\n\nBạn muốn biết thêm về vấn đề nào?';
            }

            const botMessage = {
                type: 'bot',
                content: response,
                timestamp: new Date()
            };
            this.addMessage(botMessage);
        }

        addMessage(message) {
            this.messages.push(message);
            this.renderMessage(message);
            this.scrollToBottom();
        }

        renderMessage(message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${message.type === 'user' ? 'justify-end' : 'justify-start'}`;

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = `max-w-xs px-4 py-2 rounded-lg ${
                message.type === 'user'
                    ? 'bg-blue-500 text-white'
                    : 'bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 border border-gray-200 dark:border-gray-600'
            }`;

            // Handle multiline content
            const contentDiv = document.createElement('div');
            contentDiv.className = 'text-sm whitespace-pre-line';
            contentDiv.textContent = message.content;
            bubbleDiv.appendChild(contentDiv);

            messageDiv.appendChild(bubbleDiv);
            this.chatMessages.appendChild(messageDiv);
        }

        showTyping() {
            if (this.isTyping) return;

            this.isTyping = true;
            const typingDiv = document.createElement('div');
            typingDiv.className = 'flex justify-start';
            typingDiv.id = 'typing-indicator';

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 border border-gray-200 dark:border-gray-600 px-4 py-2 rounded-lg';

            const typingText = document.createElement('div');
            typingText.className = 'text-sm flex items-center space-x-1';
            typingText.innerHTML = `
                <span>Đang nhập</span>
                <div class="flex space-x-1">
                    <div class="w-1 h-1 bg-gray-500 rounded-full animate-bounce"></div>
                    <div class="w-1 h-1 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-1 h-1 bg-gray-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
            `;

            bubbleDiv.appendChild(typingText);
            typingDiv.appendChild(bubbleDiv);
            this.chatMessages.appendChild(typingDiv);
            this.scrollToBottom();
        }

        hideTyping() {
            if (!this.isTyping) return;

            const typingIndicator = document.getElementById('typing-indicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
            this.isTyping = false;
        }

        scrollToBottom() {
            if (this.chatMessages) {
                this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
            }
        }

        openChat() {
            const assistantWindow = document.getElementById('ai-assistant-window');
            if (assistantWindow) {
                assistantWindow.classList.remove('hidden');
                setTimeout(() => {
                    if (this.chatWindow) {
                        this.chatWindow.classList.remove('hidden');
                    }
                }, 100);
            }
        }

        closeChat() {
            if (this.chatWindow) {
                this.chatWindow.classList.add('hidden');
                setTimeout(() => {
                    const assistantWindow = document.getElementById('ai-assistant-window');
                    if (assistantWindow) {
                        assistantWindow.classList.add('hidden');
                    }
                }, 300);
            }
        }
    }

    // Initialize chatbot when DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
        window.IVSFABChatbot = new IVSFABChatbot();
    });

    // Make chatbot available globally
    window.IVSFABChatbot = new IVSFABChatbot();
})();
</script>
