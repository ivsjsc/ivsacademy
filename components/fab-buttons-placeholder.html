<div id="fab-buttons-placeholder"></div>
<script>
  fetch('/components/fab-container.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('fab-buttons-placeholder').innerHTML = html;
      if (window.IVSFabController && typeof window.IVSFabController.init === 'function') {
        window.IVSFabController.init();
      }
    });
</script>
