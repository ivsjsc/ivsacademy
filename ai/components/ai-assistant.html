<link href="css/tailwind.css" rel="stylesheet"/>
<!-- FILE: ai-assistant.html -->
<!-- This file contains the HTML structure for the floating AI Assistant chat window. -->
<div class="fixed inset-auto right-6 bottom-20 fab-topmost hidden" id="ai-assistant-window">
<!-- Chat Window -->
<div class="absolute bottom-16 right-0 max-w-[92vw] sm:max-w-xs w-full sm:w-80 h-96 bg-white dark:bg-gray-800 rounded-lg shadow-2xl border border-gray-200 dark:border-gray-700 hidden flex-col transition-all duration-300" id="chat-window">
<!-- Chat Header -->
<div class="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-4 rounded-t-lg">
<div class="flex items-center justify-between">
<div class="flex items-center space-x-2">
<div class="w-8 h-8 bg-white bg-opacity-20 rounded-full flex items-center justify-center">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 20 20">
<path d="M10 12a2 2 0 100-4 2 2 0 000 4z"></path>
<path clip-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" fill-rule="evenodd"></path>
</svg>
</div>
<div>
<h3 class="font-semibold text-sm">IVS Assistant</h3>
<p class="text-xs opacity-90">Hỗ trợ 24/7</p>
</div>
</div>
<button class="text-white hover:bg-white hover:bg-opacity-20 rounded-full p-1 transition-colors" id="chat-close">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</div>
<!-- Chat Messages -->
<div class="flex-1 p-4 space-y-4 overflow-y-auto bg-gray-50 dark:bg-gray-900" id="chat-messages">
<!-- Messages will be inserted here -->
</div>
<!-- Chat Input -->
<div class="p-4 border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-b-lg">
<div class="flex space-x-2">
<input class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-white text-sm" id="chat-input" placeholder="Nhập câu hỏi của bạn..." type="text"/>
<button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2" id="chat-send">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<!-- Microphone record button -->
<button class="ml-2 bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 px-3 py-2 rounded-lg transition-colors focus:outline-none" id="chat-record" title="Ghi âm và hỏi bằng giọng nói">
<svg class="w-4 h-4" fill="currentColor" id="chat-record-icon" viewbox="0 0 20 20"><path d="M10 2a2 2 0 00-2 2v6a2 2 0 104 0V4a2 2 0 00-2-2z"></path><path d="M5 10a5 5 0 0010 0h-1a4 4 0 11-8 0H5z"></path></svg>
</button>
</div>
<div class="flex space-x-1 mt-2 items-center">
<button class="quick-reply px-2 py-1 text-xs bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" data-reply="courses">Khóa học</button>
<button class="quick-reply px-2 py-1 text-xs bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" data-reply="teachers">Giáo viên</button>
<button class="quick-reply px-2 py-1 text-xs bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" data-reply="contact">Liên hệ</button>
<button class="ml-auto px-2 py-1 text-xs bg-red-100 dark:bg-red-700 text-red-700 dark:text-red-100 rounded hover:bg-red-200 dark:hover:bg-red-600 transition-colors" id="chat-clear" title="Xóa cuộc trò chuyện">Xóa</button>
</div>
</div>
</div>
</div>
