version: '3.9'

services:
  # Celestech Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DEBUG: 'true'
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - celestech
    command: npm run dev

  # Firebase Emulator (optional, for testing without real Firebase)
  firebase-emulator:
    image: google/cloud-sdk:emulators
    ports:
      - "5000:5000"  # Hosting
      - "5001:5001"  # Realtime Database
      - "8080:8080"  # Firestore
      - "9099:9099"  # Auth
    volumes:
      - ./firebase.json:/workspace/firebase.json
    networks:
      - celestech
    command: firebase emulators:start --only firestore,auth

networks:
  celestech:
    driver: bridge
