<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!-- Sử dụng Inter cho giao diện và Merriweather cho nội dung đọc để tối ưu trải nghiệm -->
    <title data-lang-key="readnovel_part1_title">LEGNAXE: Bí mật cuộc đại chiến Thiên Đàng</title>
    <meta content="LEGNAXE Phần 1: Bí mật cuộc đại chiến Thiên Đàng. Khám phá nguồn gốc xung đột giữa các thiên thần, sự tạo dựng loài người và những lựa chọn định mệnh." name="description"/>
    
    <!-- Tải Tailwind CSS CDN (Đảm bảo hoạt động trong môi trường độc lập) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Cấu hình Tailwind và Fonts */
        :root {
            --font-size-multiplier: 1.0;
        }
        body {
            /* Sử dụng font Inter cho toàn bộ giao diện, trừ phần nội dung truyện */
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding-top: 64px; /* Dành chỗ cho Fixed Top Bar */
            padding-bottom: 80px; /* Dành chỗ cho Fixed Bottom Nav */
            transition: background-color 0.3s, color 0.3s;
        }
        /* Custom scrollbar cho chế độ Dark */
        .dark body::-webkit-scrollbar { width: 10px; }
        .dark body::-webkit-scrollbar-track { background: #111827; }
        .dark body::-webkit-scrollbar-thumb { background-color: #4b5563; border-radius: 20px; border: 2px solid #111827; }
        .dark body::-webkit-scrollbar-thumb:hover { background-color: #6b7280; }

        /* Prose Overrides: Tối ưu hóa phông chữ và kích thước */
        .story-content-wrapper .prose {
            max-width: none;
            /* Font Merriweather cho trải nghiệm đọc tiểu thuyết cổ điển */
            font-family: 'Merriweather', serif;
            color: #111827;
        }
        .dark .story-content-wrapper .prose { color: #ffffff; }

        .story-content-wrapper .prose p {
            font-size: calc(1.125rem * var(--font-size-multiplier)) !important; /* Mặc định 18px */
            margin-bottom: 1.5rem;
            line-height: 1.8; /* Tăng khoảng cách dòng để dễ đọc */
            text-align: justify;
        }
        .story-content-wrapper .chapter h3 {
            font-size: calc(1.875rem * var(--font-size-multiplier)) !important;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 0.75rem;
        }
        .dark .chapter h3 { border-bottom-color: #374151; }

        /* Chapter transition logic (Giữ nguyên cũ) */
        .chapter { transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out; opacity: 0; transform: translateY(15px); display: none; }
        .chapter.active { opacity: 1; transform: translateY(0); display: block; }

        /* Modal transition logic (Giữ nguyên cũ) */
        #chapter-modal { transition: opacity 0.3s ease-in-out; }
        #chapter-modal .modal-content { transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out; }
        #chapter-modal.modal-active { opacity: 1 !important; pointer-events: auto; z-index: 50; }
        #chapter-modal.modal-active .modal-content { transform: scale(1); opacity: 1; }
        
        #settings-modal { transition: opacity 0.3s ease-in-out; }
        #settings-modal .modal-content { transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out; }
        #settings-modal.modal-active { opacity: 1 !important; pointer-events: auto; z-index: 50; }
        #settings-modal.modal-active .modal-content { transform: scale(1); opacity: 1; }

        /* Ẩn nút cuộn lên khi không cần thiết */
        #scroll-to-top-btn { transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out; pointer-events: auto; }
        #scroll-to-top-btn.hidden { opacity: 0; transform: translateY(10px); pointer-events: none; }

        /* Fixed Top Bar (Cấu trúc mới) */
        .fixed-top-bar {
            z-index: 40;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
        }
        .dark .fixed-top-bar {
            box-shadow: 0 4px 6px -1px rgba(255, 255, 255, 0.05), 0 2px 4px -2px rgba(255, 255, 255, 0.05);
        }
        /* Cấu trúc mới cho Bottom Nav: 3 nút ngang nhau trên mobile */
        .fixed-bottom-nav .nav-button {
            width: 33.33%; /* 3 nút chia đều 100% */
        }
    </style>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300 ease-in-out" id="page-readnovel">

    <!-- 1. FIXED TOP CONTROL BAR (Thanh Điều Khiển Cố Định) -->

            <!-- Chapter Info (Placeholder for dynamic update) -->
            <h2 id="current-chapter-title" class="text-lg font-semibold truncate max-w-[40vw] text-gray-700 dark:text-gray-200" data-lang-key="readnovel_part1_title_short">

                <button class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 p-2 rounded-full transition-colors" id="list-chapter-btn-top" aria-label="Mục lục chương">

    <!-- 2. MAIN READING CONTENT (Nội Dung Chính) -->
    <main class="max-w-4xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
        <!-- Title and Banner -->
        <h1 class="text-3xl sm:text-4xl font-extrabold text-center text-gray-900 dark:text-gray-50 mb-6 mt-4" data-lang-key="readnovel_part1_title">

    <div class="modal fixed inset-0 bg-black bg-opacity-60 dark:bg-opacity-75 flex items-center justify-center p-4 transition-opacity duration-300 ease-in-out opacity-0 pointer-events-none" id="settings-modal">
        <div class="modal-content bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-2xl shadow-2xl w-full max-w-xs relative transform transition-all duration-300 ease-in-out scale-95 opacity-0">

                    <span id="moonIcon" class="transform translate-x-1 transition-transform inline-block w-4 h-4 bg-white rounded-full">
                         <i class="fas fa-moon text-gray-600 text-xs"></i>
                    </span>
                    <span id="sunIcon" class="transform translate-x-6 transition-transform hidden inline-block w-4 h-4 bg-white rounded-full">

                </button>

            <!-- 5.2. Font Size Controls (Tăng giảm cỡ chữ) -->

                    </button>

    <!-- Deferred JavaScript Libraries (Giữ nguyên) -->
    <script defer="" src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script defer="" src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer="" src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Core Application Scripts - Order is crucial (Tất cả đã được thêm "/") -->
    <script defer="" src="/js/firebase-init.js" type="module"></script>
    <script defer="" src="/js/utils.js"></script>
    <script defer="" src="/js/language.js"></script>
    <script defer="" src="/js/fabController.js"></script>
    <script defer="" src="/js/chapter-loader.js"></script>
    <script defer="" src="/js/loadComponents.js"></script>
    <script>
        // Global variables and setup
        const bodyElement = document.body;
        const fontSizeMultipliers = [0.8, 1.0, 1.2, 1.4];
        let currentFontSizeIndex = 1;

        // Theme elements
        const htmlElement = document.documentElement;
        const darkModeToggle = document.getElementById('darkModeToggle');
        const moonIcon = document.getElementById('moonIcon');
        const sunIcon = document.getElementById('sunIcon');
        
        // Modal elements
        const chapterModal = document.getElementById('chapter-modal');
        const listChapterBtnTop = document.getElementById('list-chapter-btn-top');
        const listChapterBtnBottom = document.getElementById('list-chapter-btn');
        const closeModalBtn = document.getElementById('close-modal-btn');
        
        // New Settings Modal elements
        const settingsModal = document.getElementById('settings-modal');
        const openSettingsModalBtn = document.getElementById('open-settings-modal-btn');
        const closeSettingsModalBtn = document.getElementById('close-settings-modal-btn');

        // Font controls
        const decreaseFontBtn = document.getElementById('decrease-font-btn');
        const resetFontBtn = document.getElementById('reset-font-btn');
        const increaseFontBtn = document.getElementById('increase-font-btn');
        const scrollToTopBtn = document.getElementById('scroll-to-top-btn');


        // --- Theme Functions ---
        function updateThemeToggleIcon(isDark) {
             // Cập nhật icon và vị trí toggle
             if (moonIcon && sunIcon) {
                // Toggle visible icons
                moonIcon.classList.toggle('hidden', isDark);
                sunIcon.classList.toggle('hidden', !isDark);
                
                // Toggle position
                const toggleSpan = darkModeToggle.querySelector('span');
                if (isDark) {
                    darkModeToggle.classList.add('bg-blue-600');
                    darkModeToggle.classList.remove('bg-gray-300');
                    toggleSpan.classList.add('translate-x-6');
                    toggleSpan.classList.remove('translate-x-1');
                } else {
                    darkModeToggle.classList.remove('bg-blue-600');
                    darkModeToggle.classList.add('bg-gray-300');
                    toggleSpan.classList.remove('translate-x-6');
                    toggleSpan.classList.add('translate-x-1');
                }
            }
        }

        function applyTheme(isDark) {
            htmlElement.classList.toggle('dark', isDark);
            updateThemeToggleIcon(isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function loadInitialTheme() {
            const savedTheme = localStorage.getItem('theme');
            // Mặc định là dark mode nếu không có cài đặt lưu, hoặc nếu hệ thống chọn dark mode
            let currentIsDarkMode = savedTheme === 'dark' || (savedTheme === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
            applyTheme(currentIsDarkMode);
        }
        
        // --- Font Size Functions ---
        function applyFontSize() {
            bodyElement.style.setProperty('--font-size-multiplier', fontSizeMultipliers[currentFontSizeIndex]);
            localStorage.setItem('fontSizeIndex', currentFontSizeIndex);
            // Cập nhật trạng thái disabled của các nút
            decreaseFontBtn.disabled = currentFontSizeIndex === 0;
            increaseFontBtn.disabled = currentFontSizeIndex === fontSizeMultipliers.length - 1;
        }

        function loadInitialFontSize() {
            const savedFontSizeIndex = localStorage.getItem('fontSizeIndex');
            if (savedFontSizeIndex !== null) {
                currentFontSizeIndex = parseInt(savedFontSizeIndex);
                if (currentFontSizeIndex < 0 || currentFontSizeIndex >= fontSizeMultipliers.length) {
                    currentFontSizeIndex = 1;
                }
            }
            applyFontSize();
        }

        // --- Modal Control Functions (Chapter List & Settings) ---
        function openModal(modalElement) {
            modalElement.style.display = 'flex';
            setTimeout(() => { modalElement.classList.add('modal-active'); }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal(modalElement) {
            modalElement.classList.remove('modal-active');
            setTimeout(() => {
                if (!modalElement.classList.contains('modal-active')) {
                    modalElement.style.display = 'none';
                }
            }, 300);
            document.body.style.overflow = '';
        }


        // --- Main Initialization Block ---
        window.onPageComponentsLoadedCallback = function() {
            console.log("onPageComponentsLoadedCallback triggered. Initializing UI...");

            loadInitialTheme();
            loadInitialFontSize();
            
            // Initialize AOS
            AOS.init({ duration: 700, once: true, offset: 50, easing: 'ease-out-cubic' });
            
            // Apply translations (existing logic)
            if (window.system && typeof window.system.applyTranslations === 'function') {
                // Chức năng ngôn ngữ sẽ tìm các data-lang-key và dịch thuật.
                window.system.applyTranslations();
            }

            // Initialize FAB Controller (existing logic)
            if (window.IVSFabController && typeof window.IVSFabController.init === 'function') {
                window.IVSFabController.init();
            }

            // Determine the current language from the html tag
            const currentLang = document.documentElement.lang;

            // Initialize Chapter Loader (existing logic)
            const storyPath = 'legnaxe_part1'; 
            const totalChapters = 27; 
            if (typeof window.initializeChapterLoader === 'function') {
                window.initializeChapterLoader(storyPath, totalChapters, currentLang); 
            } else {
                console.error("Error: initializeChapterLoader is not defined.");
            }

            // --- Event Listeners for NEW Layout ---

            // 1. Theme Toggle Listener
            darkModeToggle?.addEventListener('click', () => {
                let currentIsDarkMode = !htmlElement.classList.contains('dark');
                applyTheme(currentIsDarkMode);
            });

            // 2. Font Size Controls Listeners
            decreaseFontBtn?.addEventListener('click', () => {
                if (currentFontSizeIndex > 0) {
                    currentFontSizeIndex--;
                    applyFontSize();
                }
            });

            resetFontBtn?.addEventListener('click', () => {
                currentFontSizeIndex = 1;
                applyFontSize();
            });

            increaseFontBtn?.addEventListener('click', () => {
                if (currentFontSizeIndex < fontSizeMultipliers.length - 1) {
                    currentFontSizeIndex++;
                    applyFontSize();
                }
            });

            // 3. Chapter List Modal Listeners (Using original IDs)
            listChapterBtnTop?.addEventListener('click', () => { openModal(chapterModal); });
            // Gán listener cho nút Mục Lục ở thanh dưới
            listChapterBtnBottom?.addEventListener('click', () => { openModal(chapterModal); }); 
            
            closeModalBtn?.addEventListener('click', () => { closeModal(chapterModal); });
            chapterModal?.addEventListener('click', (event) => { if (event.target === chapterModal) { closeModal(chapterModal); } });
            
            // 4. NEW Settings Modal Listeners
            openSettingsModalBtn?.addEventListener('click', () => { openModal(settingsModal); });
            closeSettingsModalBtn?.addEventListener('click', () => { closeModal(settingsModal); });
            settingsModal?.addEventListener('click', (event) => { if (event.target === settingsModal) { closeModal(settingsModal); } });


            // 5. Scroll to Top Listener
            scrollToTopBtn?.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            window.addEventListener('scroll', () => {
                if (window.pageYOffset > 300) {
                    scrollToTopBtn.classList.remove('hidden');
                } else {
                    scrollToTopBtn.classList.add('hidden');
                }
            });
            
            // 6. Copy to Clipboard (Existing logic, ensured global)
            function copyToClipboard(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    const messageBox = document.createElement('div');
                    // Cập nhật message box sang tiếng Việt
                    messageBox.textContent = 'Liên kết đã được sao chép vào clipboard!';
                    messageBox.style.cssText = 'position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background-color: #4CAF50; color: white; padding: 10px 20px; border-radius: 5px; z-index: 1000; opacity: 0; transition: opacity 0.5s;';
                    document.body.appendChild(messageBox);
                    setTimeout(() => { messageBox.style.opacity = 1; }, 10);
                    setTimeout(() => { messageBox.style.opacity = 0; messageBox.addEventListener('transitionend', () => messageBox.remove()); }, 3000);
                } catch (err) { console.error('Failed to copy: ', err); }
                document.body.removeChild(textarea);
            }
            window.copyToClipboard = copyToClipboard;

        };
    </script>
</body>
</html>
