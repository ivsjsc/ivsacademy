    <!-- Cấu hình Tailwind và Font Inter -->

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ivs-primary': '#1D4ED8', // Dark Blue - Tư duy chiến lược

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            color: #1F2937;
            background-color: #F9FAFB;
        }
        .section-heading::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: #FBBF24;
            margin-top: 8px;
            border-radius: 9999px;

<body class="antialiased">

    <!-- Call to Action -->

            <p data-key="cta_section.description" class="text-xl text-gray-200 mb-8"></p>
            <a href="#" class="inline-block px-10 py-4 bg-ivs-secondary text-ivs-dark font-bold text-xl rounded-xl shadow-2xl hover:bg-yellow-400 transition duration-300 transform hover:scale-105" data-key="nav.cta_button_large">Yêu Cầu Tư Vấn Ngay</a>

    <!-- Footer -->

    <script>
        // NOTE: Trong môi trường thực tế, Quý vị sẽ dùng fetch() để tải file JSON tương ứng (ví dụ: 'vi.json' hoặc 'en.json')
        // Dưới đây là dữ liệu mẫu (mock data) dựa trên file webdesign_data.json của Quý vị để minh họa cách JS hoạt động.

            },
            "principles_section": {
                "title": "Thiết Kế Theo Nguyên Tắc IVS",
                "principles": [
                    {
                        "name": "Tầm Nhìn & Chiến Lược",
                        "description": "Xây dựng website không chỉ cho hiện tại mà còn cho sự mở rộng trong **5-10 năm tới**, hỗ trợ các liên kết quốc tế (**Hoa Kỳ, Đài Loan, châu Âu**)."
                    },

                        "description": "Kiểm tra nghiêm ngặt từng module, đảm bảo tính **bảo mật cao** cho dữ liệu học viên và đối tác. Code sạch, tối ưu hóa SEO ngay từ đầu."
                    },
                    {
                        "name": "Hiệu Quả & Thực Tế",
                        "description": "Tập trung vào các tính năng mang lại **lợi ích kinh doanh trực tiếp**: Tăng tỷ lệ chuyển đổi tuyển sinh, quản lý học viên tự động, tiết kiệm thời gian vận hành."
                    }
                ]
            },
            "solutions_section": {
                "title": "Các Giải Pháp Website Trọng Tâm",
                "solutions": [
                    {
                        "type_name": "Loại 1: Nền Tảng Giáo Dục (LMS)",
                        "focus": "Tập trung: IVS LIFE Minds & Chương trình Đào tạo Quốc tế",
                        "features": [
                          "**Quản lý Học tập (LMS):** Tích hợp phân phối giáo trình **IVS LIFE Minds**, quản lý tiến độ, bài kiểm tra và cấp chứng chỉ online.",
                          "**Cổng Du học & Trao đổi:** Module tiếp nhận và xử lý hồ sơ tự động cho các chương trình liên kết với **Hoa Kỳ, Đài Loan, Philippines, châu Âu**.",

                        ]
                    },
                    {
                        "type_name": "Loại 2: Website Doanh Nghiệp (B2B)",
                        "focus": "Tập trung: Thể hiện Uy tín, Tư vấn Pháp lý và Đối tác",
                        "features": [
                          "**Hồ sơ Năng lực Trực tuyến:** Trình bày chi tiết **giải pháp giáo dục toàn diện**, báo cáo tài chính và đối tác chiến lược.",
                          "**Dịch vụ Tư vấn Pháp lý:** Cổng thông tin hỗ trợ thành lập và vận hành trung tâm giáo dục, tạo sự tin cậy tuyệt đối.",
                          "**Phòng Báo Chí Kỹ thuật số:** Quản lý thông cáo, sự kiện và hình ảnh minh bạch."

                    },
                    {

                          "**Tích hợp Thanh toán:** Hỗ trợ nhiều cổng thanh toán an toàn, bảo mật cao.",

                    }
                ]
            },
            "process_section": {
                "title": "Quy Trình Triển Khai Chủ Động & Kỹ Càng",
                "steps": [
                    {"id": "01", "name": "Phân tích Chiến lược", "description": "Xác định mục tiêu IVS (tuyển sinh, đối tác, du học) và xây dựng cấu trúc website."},
                    {"id": "02", "name": "Thiết kế Chính xác (UX/UI)", "description": "Wireframe và Mockup tập trung vào trải nghiệm người dùng, đảm bảo tính chuyên nghiệp quốc tế."},
                    {"id": "03", "name": "Lập trình Hiệu quả", "description": "Sử dụng công nghệ hiện đại, code sạch, tối ưu hóa tốc độ và tương thích đa thiết bị."},
                    {"id": "04", "name": "Kiểm duyệt Kỹ càng & Bàn giao", "description": "Thử nghiệm bảo mật, tốc độ. Đào tạo vận hành và hỗ trợ kỹ thuật dài hạn."}
                ],
                "core_tech_title": "Công nghệ Cốt lõi:",
                "core_tech_desc": "Chúng tôi ưu tiên các giải pháp **chủ động, hiệu quả** như React/Next.js cho front-end, tích hợp API đa nền tảng và tối ưu hóa cho tốc độ truy cập toàn cầu."
            },
            "cta_section": {
                "title": "Sẵn Sàng Hành Động Thực Tế?",
                "description": "Liên hệ ngay để nhận bản đề xuất **chính xác** và **tư vấn chiến lược** chi tiết nhất cho dự án của Quý vị."
            },
            "footer": {
                "copyright": "&copy; 2025 IVS Digital Solutions. Thiết Kế Website theo nguyên tắc: Chính xác, Kỹ càng, Hiệu quả."
            }
        };

        const globalData = dataVI; // Dùng dataVI để chạy thử
        
        // Hàm lấy giá trị từ JSON theo chuỗi key (ví dụ: 'hero_section.title')
        function getNestedValue(obj, path) {
            const parts = path.split('.');
            let current = obj;
            for (const part of parts) {
                if (current && current[part] !== undefined) {
                    current = current[part];
                } else {
                    return null;
                }
            }
            return current;
        }

        // Hàm áp dụng Localization
        function applyLocalization(data) {
            // 1. Áp dụng cho các element có data-key
            document.querySelectorAll('[data-key]').forEach(el => {
                const keyPath = el.getAttribute('data-key');
                let content = getNestedValue(data, keyPath);
                
                if (content) {
                    // Sử dụng innerHTML để hiển thị các thẻ markdown/html như <strong>/<b>
                    el.innerHTML = content;
                }
            });

            // 2. Áp dụng cho Solutions Section (vì đây là mảng, cần tạo DOM động)
            const solutionsContainer = document.getElementById('solutions-container');
            if (solutionsContainer) {
                solutionsContainer.innerHTML = ''; // Clear previous content
                data.solutions_section.solutions.forEach(solution => {
                    const solutionBlock = document.createElement('div');
                    solutionBlock.className = 'md:flex md:space-x-12 p-8 bg-white rounded-2xl shadow-xl';
                    
                    let featuresList = solution.features.map(feature => 
                        `<li class="flex items-start">
                            <span class="text-ivs-primary mr-3 text-xl font-bold">&#10003;</span>
                            ${feature}
                        </li>`
                    ).join('');

                    solutionBlock.innerHTML = `
                        <div class="md:w-1/3 mb-6 md:mb-0">
                            <h3 class="text-2xl font-bold text-ivs-primary mb-2">${solution.type_name}</h3>
                            <p class="text-ivs-secondary font-semibold">${solution.focus}</p>
                        </div>
                        <div class="md:w-2/3">
                            <ul class="space-y-4 text-gray-700">
                                ${featuresList}
                            </ul>
                        </div>
                    `;
                    solutionsContainer.appendChild(solutionBlock);
                });
            }

            // 3. Áp dụng cho Process Steps Section (vì đây là mảng, cần tạo DOM động)
            const stepsContainer = document.getElementById('steps-container');
            if (stepsContainer) {
                stepsContainer.innerHTML = '';
                data.process_section.steps.forEach(step => {
                    const stepBlock = document.createElement('div');
                    stepBlock.className = 'p-6 bg-white rounded-xl shadow-lg border border-gray-100';
                    stepBlock.innerHTML = `
                        <div class="text-5xl font-extrabold text-ivs-secondary mb-2">${step.id}</div>
                        <h4 class="font-bold text-lg mb-2">${step.name}</h4>
                        <p class="text-sm text-gray-600">${step.description}</p>
                    `;
                    stepsContainer.appendChild(stepBlock);
                });
            }
        }

        // Gọi hàm khi tài liệu đã tải xong
        window.onload = () => {
            applyLocalization(globalData);
        };

        // Hàm thay đổi ngôn ngữ (chỉ là giả định)
        function changeLanguage(langCode) {
            // Trong môi trường thực, Quý vị sẽ tải file JSON (ví dụ: fetch('en.json').then(...) )
            alert(`Đã chuyển sang chế độ ngôn ngữ: ${langCode}. (Lưu ý: Đây chỉ là chức năng giả định. Quý vị cần thay đổi file JSON để thấy nội dung mới).`);
            // Ví dụ: applyLocalization(dataEN);
        }
    </script>
</body>
</html>
