        const globalData = dataVI;
        
        // Hàm lấy giá trị từ JSON theo chuỗi key (ví dụ: 'hero_section.title')
        function getNestedValue(obj, path) {
            const parts = path.split('.');
            let current = obj;
            for (const part of parts) {
                if (current && current[part] !== undefined) {
                    current = current[part];
                } else {
                    return null;
                }
            }
            return current;
        }

        // Hàm áp dụng Localization
        function applyLocalization(data) {
            // 1. Áp dụng cho các element có data-key (text content)
            document.querySelectorAll('[data-key]').forEach(el => {
                const keyPath = el.getAttribute('data-key');
                let content = getNestedValue(data, keyPath);
                
                if (content) {
                    // Sử dụng innerHTML để hiển thị các thẻ markdown/html như <strong>/<b>
                    el.innerHTML = content;
                }
            });

            // 2. Áp dụng cho các element có data-key-list (tạo list <ul><li>)
            document.querySelectorAll('[data-key-list]').forEach(ul => {
                const keyPath = ul.getAttribute('data-key-list');
                const features = getNestedValue(data, keyPath);
                
                if (features && Array.isArray(features)) {
                    ul.innerHTML = ''; // Clear previous content
                    features.forEach(feature => {
                        const iconClass = ul.parentElement.classList.contains('price-card-premium') ? 'text-ivs-secondary' : 'text-ivs-primary';
                        // Thêm icon và nội dung vào li
                        ul.innerHTML += `
                            <li class="flex items-start">
                                <span class="feature-check ${iconClass} mr-3 text-lg font-bold">&#10003;</span>
                                ${feature}
                            </li>
                        `;
                    });
                }
            });

            // 3. Áp dụng cho các element có data-key-href (set href attribute)
            document.querySelectorAll('[data-key-href]').forEach(el => {
                const keyPath = el.getAttribute('data-key-href');
                const url = getNestedValue(data, keyPath);
                if (url) {
                    el.setAttribute('href', url);
                }
            });

            // 4. Áp dụng cho Image: Đảm bảo src đã được đặt đúng trong HTML.
        }

        // Gọi hàm khi tài liệu đã tải xong
        window.onload = () => {
            applyLocalization(globalData);
            // Khởi tạo AOS
            if (typeof AOS !== 'undefined') {
                AOS.init({
                    duration: 800,
                    once: true,
                });
            }
        };
