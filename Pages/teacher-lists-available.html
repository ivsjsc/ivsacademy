<!DOCTYPE html>
<html class="dark scroll-smooth" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title data-lang-key="page_title_teacher_list">IVS Global Teacher Hub - Danh sách Giáo viên</title>
    <meta content="Khám phá danh sách giáo viên nước ngoài chất lượng cao tại IVS Global Teacher Hub. Tìm kiếm và lựa chọn giáo viên phù hợp cho trường học hoặc trung tâm của bạn." data-lang-key="meta_description_teacher_list" name="description"/>
    <meta content="danh sách giáo viên, giáo viên nước ngoài, IVS Global Teacher Hub, tuyển dụng giáo viên, giáo viên bản ngữ, giáo viên Filipino" data-lang-key="meta_keywords_teacher_list" name="keywords"/>
    <meta content="Danh sách Giáo viên Quốc tế | IVS Global Teacher Hub" data-lang-key="og_title_teacher_list" property="og:title"/>
    <meta content="Duyệt qua hồ sơ chi tiết của các giáo viên nước ngoài đã được IVS xác minh. Lọc theo quốc tịch, chuyên môn và kinh nghiệm để tìm kiếm ứng viên lý tưởng." data-lang-key="og_description_teacher_list" property="og:description"/>
    <meta content="https://ivsjsc.github.io/images/banners/teacher-list-og.png" property="og:image"/>
    <meta content="https://ivsacademy.edu.vn/Pages/teacher-lists-available.html" property="og:url"/>
    <meta content="website" property="og:type"/>
    <meta content="IVS JSC" name="author"/>
    <link href="/images/logo/logo.svg" rel="icon" type="image/svg+xml"/>
    <link href="../css/tailwind.css" rel="stylesheet"/>
    <link crossorigin="anonymous" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" referrerpolicy="no-referrer" rel="stylesheet"/>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script defer src="../js/language-init.js"></script>
    <style>
        :root { --header-height: 4rem; }
        body { background-color: #1a1a1a; color: #f4f4f5; font-family: 'Be Vietnam Pro', sans-serif; overflow-x: hidden; padding-top: var(--header-height); }
        #header-placeholder { position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); z-index: 1000; background-color: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #1f2937; }
        .teacher-card { background: #111111; border: 1px solid #27272A; transition: all 0.3s ease; }
        .teacher-card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px -5px rgba(76, 94, 247, 0.2); border-color: #4c5ef7; }
    </style>
</head>
<body class="bg-ivs-bg text-ivs-text-primary font-inter">

<header id="header-placeholder"></header>

<main class="container mx-auto px-4 py-12">
    <!-- Hero Section -->
    <section class="text-center mb-12" data-aos="fade-up">
        <h1 class="text-4xl md:text-5xl font-extrabold text-ivs-blue mb-4" data-lang-key="hub_teacher_list_title_enhanced">Khám phá Hồ sơ Giáo viên Quốc tế</h1>
        <p class="text-lg md:text-xl text-ivs-text-secondary max-w-3xl mx-auto" data-lang-key="hub_teacher_list_desc_enhanced_alt">Tìm kiếm và kết nối với các nhà giáo dục tài năng từ khắp nơi trên thế giới, sẵn sàng đồng hành cùng sự phát triển của học viên Việt Nam.</p>
    </section>

    <!-- Search and Filter Section -->
    <section class="mb-10" data-aos="fade-up" data-aos-delay="100">
        <div class="max-w-2xl mx-auto">
            <div class="relative">
                <input type="search" id="teacher-search-input" class="w-full p-4 pl-12 text-lg bg-ivs-card border border-ivs-border rounded-full focus:ring-2 focus:ring-ivs-blue focus:outline-none" placeholder="Tìm theo tên, quốc tịch, chuyên môn..." data-lang-key="search_teacher_placeholder">
                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                    <i class="fas fa-search text-ivs-text-secondary"></i>
                </div>
                <button id="clear-search-btn" class="absolute inset-y-0 right-0 items-center pr-4 text-ivs-text-secondary hover:text-white hidden"><i class="fas fa-times-circle"></i></button>
            </div>
        </div>
    </section>

    <!-- Teacher List Section -->
    <section>
        <div id="teacher-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Teacher cards will be dynamically inserted here -->
        </div>
        <div id="loading-state" class="text-center py-10 hidden">
            <i class="fas fa-spinner fa-spin text-4xl text-ivs-blue"></i>
            <p class="mt-4 text-lg" data-lang-key="loading_text">Đang tải danh sách giáo viên...</p>
        </div>
        <div id="no-results-state" class="text-center py-10 hidden">
            <i class="fas fa-user-slash text-5xl text-ivs-text-secondary mb-4"></i>
            <h3 class="text-2xl font-semibold mb-2" data-lang-key="hub_no_teachers_found_search">Không tìm thấy giáo viên nào.</h3>
            <p class="text-ivs-text-secondary" data-lang-key="hub_try_different_search">Vui lòng thử lại với từ khóa hoặc bộ lọc khác.</p>
        </div>
    </section>
</main>

<!-- Modal for teacher details -->
<div id="teacher-modal" class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center p-4" data-aos="fade-in">
    <div class="bg-ivs-card rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-8 relative" id="modal-content">
        <button id="close-modal-btn" class="absolute top-4 right-4 text-2xl text-ivs-text-secondary hover:text-white">&times;</button>
        <!-- Modal content will be dynamically inserted here -->
    </div>
</div>

<footer id="footer-placeholder"></footer>
<div id="fab-container-placeholder"></div>

<script defer src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script defer src="/js/utils.js"></script>
<script defer src="/js/language.js"></script>
<script defer src="/ai/js/fabController.js"></script>
<script defer src="/ai/js/loadComponents.js"></script>
<script type="module" src="../js/teacher-list-controller.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof AOS !== 'undefined') {
            AOS.init({ duration: 800, once: true, offset: 50 });
        }
    });
</script>
</body>
</html>
