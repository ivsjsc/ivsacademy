<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug IVS Language System</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #111; 
            color: #fff; 
            padding: 20px; 
        }
        .log { 
            background: #222; 
            padding: 10px; 
            margin: 5px 0; 
            border-left: 3px solid #0066cc; 
        }
        .error { 
            border-left-color: #cc0000; 
        }
        .success { 
            border-left-color: #00cc00; 
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background: #0052a3;
        }
    </style>
</head>
<body>
    <h1>🔧 Debug IVS Language System</h1>
    
    <div class="controls">
        <button onclick="testLanguageFiles()">Test Language Files</button>
        <button onclick="testUtils()">Test Utils.js</button>
        <button onclick="testComponents()">Test Components</button>
        <button onclick="clearLogs()">Clear Logs</button>
    </div>
    
    <div id="logs"></div>
    
    <h2>Sample Translation Test</h2>
    <p data-lang-key="hero_title_company">KIẾN TẠO GIẢI PHÁP</p>
    <p data-lang-key="hero_description">Mô tả sẽ được dịch ở đây</p>

    <script>
        function log(message, type = 'log') {
            const logsDiv = document.getElementById('logs');
            const logDiv = document.createElement('div');
            logDiv.className = `log ${type}`;
            logDiv.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(logDiv);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            
            console[type](`[DEBUG] ${message}`);
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        async function testLanguageFiles() {
            log('🔍 Testing Language Files...', 'log');
            
            const languages = ['vi', 'en', 'zh'];
            const paths = ['lang/', '/lang/', './lang/'];
            
            for (const lang of languages) {
                log(`Testing language: ${lang}`, 'log');
                
                for (const path of paths) {
                    try {
                        const url = `${path}${lang}.json`;
                        log(`Trying: ${url}`, 'log');
                        
                        const response = await fetch(url);
                        if (response.ok) {
                            const data = await response.json();
                            log(`✅ SUCCESS: ${url} - Keys: ${Object.keys(data).length}`, 'success');
                            break;
                        } else {
                            log(`❌ HTTP ${response.status}: ${url}`, 'error');
                        }
                    } catch (error) {
                        log(`❌ FETCH ERROR ${url}: ${error.message}`, 'error');
                    }
                }
            }
        }
        
        async function testUtils() {
            log('🔍 Testing Utils.js...', 'log');
            
            try {
                // Test if utils functions are available
                if (typeof window.componentLog === 'function') {
                    log('✅ componentLog function is available', 'success');
                    window.componentLog('Test message from componentLog', 'info');
                } else {
                    log('❌ componentLog function is NOT available', 'error');
                }
                
                if (typeof window.debounce === 'function') {
                    log('✅ debounce function is available', 'success');
                } else {
                    log('❌ debounce function is NOT available', 'error');
                }
            } catch (error) {
                log(`❌ Utils test error: ${error.message}`, 'error');
            }
        }
        
        async function testComponents() {
            log('🔍 Testing Components...', 'log');
            
            const components = [
                'components/header.html',
                'components/footer.html',
                'components/fab-container.html'
            ];
            
            for (const component of components) {
                try {
                    log(`Testing: ${component}`, 'log');
                    const response = await fetch(component);
                    
                    if (response.ok) {
                        const content = await response.text();
                        log(`✅ SUCCESS: ${component} - Size: ${content.length} chars`, 'success');
                    } else {
                        log(`❌ HTTP ${response.status}: ${component}`, 'error');
                    }
                } catch (error) {
                    log(`❌ FETCH ERROR ${component}: ${error.message}`, 'error');
                }
            }
        }
        
        // Load utils.js
        log('🚀 Loading utils.js...', 'log');
        
        // Auto-run tests on load
        setTimeout(() => {
            testUtils();
            testLanguageFiles();
        }, 1000);
    </script>
    
    <!-- Load utils.js -->
    <script src="js/utils.js"></script>
    
    <!-- Load language.js -->
    <script defer src="js/language.js"></script>
</body>
</html>
